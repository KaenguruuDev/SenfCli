name: "tagged-release"

on:
  push:
    tags:
      - "*.*.*"  # raw semantic versioning

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        runtime: [win-x64, linux-x64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: |
          dotnet publish -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:Version=${{ github.ref_name }} \
            -o publish/${{ matrix.runtime }}

      - name: Zip
        run: |
          cd publish/${{ matrix.runtime }}
          if [ "${{ matrix.runtime }}" = "win-x64" ]; then
            zip -r ../../senf-win-x64-${{ github.ref_name }}.zip .
          else
            zip -r ../../senf-linux-x64-${{ github.ref_name }}.zip .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: senf-${{ matrix.runtime }}
          path: |
            senf-win-x64-${{ github.ref_name }}.zip
            senf-linux-x64-${{ github.ref_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            senf-win-x64-${{ github.ref_name }}.zip
            senf-linux-x64-${{ github.ref_name }}.zip
          prerelease: ${{ contains(github.ref_name, '-') }}