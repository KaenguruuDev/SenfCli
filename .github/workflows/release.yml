name: "tagged-release"

on:
  push:
    tags:
      - "*.*.*"  # raw semantic versioning

permissions:
  contents: write

jobs:
  tagged-release:
    name: "Tagged Release"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish Windows
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ github.ref_name }} -o publish/win-x64
          cd publish/win-x64
          zip -r ../../senf-win-x64-${{ github.ref_name }}.zip .

      - name: Publish Linux
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -p:Version=${{ github.ref_name }} -o publish/linux-x64
          cd publish/linux-x64
          zip -r ../../senf-linux-x64-${{ github.ref_name }}.zip .

      - name: Create GitHub Release
        uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            senf-win-x64-${{ github.ref_name }}.zip
            senf-linux-x64-${{ github.ref_name }}.zip